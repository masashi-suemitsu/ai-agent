<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💡 改善提案 詳細</title>
<style>
* { box-sizing: border-box; }
:root {
  --primary:#5b6eff; --bg:#f4f6fb; --border:#e2e8f0; --text:#2d3748; --text-light:#718096;
  --panel-bg:#ffffff; --input-bg:#f9fafb; --muted-bg:#f7f8fc;
}
[data-theme="dark"] {
  --bg:#1a1d2e; --border:#2d3748; --text:#e2e8f0; --text-light:#8a95a8;
  --panel-bg:#1a1d2e; --input-bg:#252840; --muted-bg:#252840;
  --feedback-banner-bg: rgba(72,187,120,.12);
  --feedback-banner-text: #68d391;
  --user-msg-bg: rgba(72,187,120,.1);
  --admin-panel-bg: rgba(237,137,54,.1);
  --admin-panel-border: rgba(237,137,54,.3);
  --admin-panel-h3: #f6ad55;
  --admin-note-bg: rgba(237,137,54,.15);
  --admin-note-border: rgba(237,137,54,.4);
}
:root {
  --feedback-banner-bg: #e6f7e0;
  --feedback-banner-text: #155013;
  --user-msg-bg: #e6f7e0;
  --admin-panel-bg: #fff8e1;
  --admin-panel-border: #f1e2a8;
  --admin-panel-h3: #7a5d00;
  --admin-note-bg: #fff8e1;
  --admin-note-border: #f59f00;
}
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif; background:var(--bg); color:var(--text); }
header { background:var(--panel-bg); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 4px rgba(0,0,0,.05); }
header h1 { font-size:15px; font-weight:700; margin:0; }
header .h-right a, header .h-right button { color:var(--text-light); text-decoration:none; font-size:12px; border:1px solid var(--border); border-radius:7px; padding:5px 12px; margin-left:6px; transition:all .15s; background:none; cursor:pointer; }
header .h-right a:hover, header .h-right button:hover { border-color:#5b6eff; color:#5b6eff; }

.wrap { max-width:960px; margin:0 auto; padding:18px; }
.banner { background:var(--feedback-banner-bg); color:var(--feedback-banner-text); padding:14px 18px; border-radius:10px; margin-bottom:14px; font-size:13.5px; line-height:1.6; }
.card { background:var(--panel-bg); border-radius:10px; padding:18px 20px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
.card h2 { margin:0 0 14px; font-size:14px; font-weight:700; color:var(--text-light); border-bottom:1px solid var(--border); padding-bottom:8px; }
.meta-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; font-size:12px; color:#718096; margin-bottom:10px; }
.chip { display:inline-block; padding:3px 11px; border-radius:12px; color:#fff; font-size:11px; font-weight:700; }
.title { font-size:18px; font-weight:700; margin:6px 0 12px; color:#1a3a5e; line-height:1.4; }
.section-grid { display:grid; grid-template-columns:140px 1fr; gap:10px 16px; font-size:13.5px; }
@media (max-width:600px) { .section-grid { grid-template-columns:1fr; } .section-grid dt { color:#5b6eff; font-weight:600; } }
.section-grid dt { color:#a0aec0; font-weight:normal; }
.section-grid dd { margin:0; white-space:pre-wrap; word-break:break-word; line-height:1.6; }
.log-list { font-size:12.5px; list-style:none; padding:0; margin:0; }
.log-list li { padding:6px 0; border-bottom:1px solid var(--border); color:var(--text); line-height:1.5; }
.log-list li:last-child { border-bottom:none; }
.chat-list .msg { padding:10px 14px; border-radius:10px; margin-bottom:8px; font-size:13.5px; line-height:1.55; }
.chat-list .msg.user { background:var(--user-msg-bg); }
.chat-list .msg.ai { background:var(--muted-bg); }
.chat-list .who { font-size:11px; color:var(--text-light); margin-bottom:4px; }
.empty { color:#a0aec0; font-size:13px; padding:14px; text-align:center; }

.admin-panel { background:var(--admin-panel-bg); border:1px solid var(--admin-panel-border); border-radius:10px; padding:14px 16px; margin-bottom:14px; }
.admin-panel h3 { margin:0 0 10px; font-size:13px; color:var(--admin-panel-h3); }
.admin-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
.admin-row label { font-size:12px; color:#4a5568; font-weight:600; min-width:60px; }
.admin-row select { padding:6px 10px; border:1px solid var(--border); border-radius:7px; font-size:13px; background:var(--input-bg); color:var(--text); }
.admin-row textarea { flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:7px; font-size:13px; font-family:inherit; min-height:60px; resize:vertical; min-width:240px; background:var(--input-bg); color:var(--text); }
.admin-row button { background:#f59f00; color:#fff; border:none; padding:8px 18px; border-radius:7px; cursor:pointer; font-weight:700; font-size:13px; }
.admin-row button:hover { background:#e08e00; }
.admin-row button:disabled { background:#d4b86c; cursor:wait; }
.loader { text-align:center; padding:24px; color:#a0aec0; font-size:13px; }
</style>
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
</head>
<body>
<header>
    <h1 id="hdrTitle">💡 改善提案 詳細</h1>
    <div class="h-right">
        <a href="/feedback">＋ 新しい報告</a>
        <a href="/feedback-admin" id="adminLink" style="display:none">⚙ 管理画面</a>
        <a href="/">トップ</a>
        <button id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
</header>
<div class="wrap">
<div id="banner" class="banner" style="display:none">
    ✅ 報告を受け付けました！マーケティング部に通知しました。<br>
    対応状況はこのページで確認できます。
</div>
<div id="content"><div class="loader">読み込み中…</div></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const id = parseInt(params.get('id'));
const justSubmitted = params.get('just_submitted') === '1';
const labelsState = { status:{}, category:{}, priority:{} };

function escapeHtml(s) {
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

async function loadLabels() {
    try {
        const r = await fetch('/api/feedback-labels');
        Object.assign(labelsState, await r.json());
    } catch(e) {}
}

async function load() {
    await loadLabels();
    if (!id) { document.getElementById('content').innerHTML = '<div class="card"><div class="empty">IDが指定されていません</div></div>'; return; }
    if (justSubmitted) document.getElementById('banner').style.display = 'block';
    const r = await fetch('/api/feedback/' + id);
    if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        document.getElementById('content').innerHTML = `<div class="card"><div class="empty">❌ ${escapeHtml(j.error || 'エラー')}</div></div>`;
        return;
    }
    const data = await r.json();
    render(data);
    if (data.isAdmin) document.getElementById('adminLink').style.display = '';
}

function render(data) {
    const r = data.report;
    document.getElementById('hdrTitle').textContent = `💡 改善提案 #${r.id}`;
    const s = labelsState.status[r.status] || { label:r.status, color:'#888' };
    const c = labelsState.category[r.category] || { label:r.category, color:'#888' };
    const p = labelsState.priority[r.priority] || { label:r.priority, color:'#888' };

    let html = `
    <div class="card">
        <div class="meta-row">
            <span class="chip" style="background:${s.color}">${escapeHtml(s.label)}</span>
            <span class="chip" style="background:${c.color}">${escapeHtml(c.label)}</span>
            <span class="chip" style="background:${p.color}">優先度: ${escapeHtml(p.label)}</span>
            <span style="margin-left:auto;">報告: ${escapeHtml(r.reporter_name || r.reporter_email)} / ${escapeHtml((r.created_at||'').slice(0,16))}</span>
        </div>
        <div class="title">${escapeHtml(r.title)}</div>
        <dl class="section-grid">
            <dt>要約</dt><dd>${escapeHtml(r.summary)}</dd>
            ${r.affected_url ? `<dt>対象URL</dt><dd><a href="${escapeHtml(r.affected_url)}" target="_blank" rel="noopener">${escapeHtml(r.affected_url)}</a></dd>` : ''}
            ${r.reproduce_steps ? `<dt>再現手順</dt><dd>${escapeHtml(r.reproduce_steps)}</dd>` : ''}
            ${r.expected_behavior ? `<dt>期待動作</dt><dd>${escapeHtml(r.expected_behavior)}</dd>` : ''}
            ${r.actual_behavior ? `<dt>実際の動作</dt><dd>${escapeHtml(r.actual_behavior)}</dd>` : ''}
            ${r.admin_note ? `<dt>管理メモ</dt><dd style="background:var(--admin-note-bg);padding:8px 12px;border-radius:6px;border-left:3px solid var(--admin-note-border);color:var(--text);">${escapeHtml(r.admin_note)}</dd>` : ''}
        </dl>
    </div>`;

    if (data.isAdmin) {
        html += `
        <div class="admin-panel">
            <h3>⚙ 管理者操作</h3>
            <div class="admin-row">
                <label>ステータス</label>
                <select id="adStatus">${Object.entries(labelsState.status).map(([k,v]) => `<option value="${k}" ${k===r.status?'selected':''}>${escapeHtml(v.label)}</option>`).join('')}</select>
                <label>優先度</label>
                <select id="adPriority">${Object.entries(labelsState.priority).map(([k,v]) => `<option value="${k}" ${k===r.priority?'selected':''}>${escapeHtml(v.label)}</option>`).join('')}</select>
                <label>カテゴリ</label>
                <select id="adCategory">${Object.entries(labelsState.category).map(([k,v]) => `<option value="${k}" ${k===r.category?'selected':''}>${escapeHtml(v.label)}</option>`).join('')}</select>
            </div>
            <div class="admin-row">
                <label>管理メモ</label>
                <textarea id="adNote" placeholder="対応状況・対応者などをメモ">${escapeHtml(r.admin_note || '')}</textarea>
            </div>
            <div class="admin-row" style="justify-content:flex-end;">
                <button id="adSave">💾 更新</button>
            </div>
        </div>`;
    }

    html += `
    <div class="card">
        <h2>📜 ステータス履歴</h2>
        ${data.logs?.length ? `<ul class="log-list">${data.logs.map(l => `
            <li><b>${escapeHtml((l.created_at||'').slice(0,16))}</b>
                ${escapeHtml(l.status_before || '-')} → ${escapeHtml(l.status_after)}
                (${escapeHtml(l.changed_by_name || l.changed_by_email || '-')})
                ${l.note ? '　— ' + escapeHtml(l.note) : ''}
            </li>`).join('')}</ul>` : '<div class="empty">履歴なし</div>'}
    </div>
    <div class="card">
        <h2>💬 元のチャット</h2>
        ${data.chat?.length ? `<div class="chat-list">${data.chat.map(m => `
            <div class="msg ${m.role === 'user' ? 'user' : 'ai'}">
                <div class="who">${m.role === 'user' ? '🧑 ' + escapeHtml(r.reporter_name || r.reporter_email) : '🤖 AI'} • ${escapeHtml((m.created_at||'').slice(11,16))}</div>
                <div>${escapeHtml(m.content)}</div>
            </div>`).join('')}</div>` : '<div class="empty">チャット履歴なし</div>'}
    </div>`;

    document.getElementById('content').innerHTML = html;

    if (data.isAdmin) {
        document.getElementById('adSave').addEventListener('click', async () => {
            const btn = document.getElementById('adSave');
            btn.disabled = true;
            const body = {
                status: document.getElementById('adStatus').value,
                priority: document.getElementById('adPriority').value,
                category: document.getElementById('adCategory').value,
                admin_note: document.getElementById('adNote').value
            };
            try {
                const r = await fetch('/api/feedback/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!r.ok) {
                    const j = await r.json().catch(() => ({}));
                    alert('更新エラー: ' + (j.error || 'unknown'));
                    btn.disabled = false;
                    return;
                }
                location.reload();
            } catch(e) {
                alert('通信エラー: ' + e.message);
                btn.disabled = false;
            }
        });
    }
}

load().then(() => {
    const t = localStorage.getItem('theme') || 'light';
    document.getElementById('themeBtn').textContent = t === 'dark' ? '☀' : '🌙';
});

function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('themeBtn').textContent = next === 'dark' ? '☀' : '🌙';
}
</script>
</body>
</html>
