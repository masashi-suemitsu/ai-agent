<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — AI エージェント</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1d2e 0%, #2d3250 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #fff;
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%;
  max-width: 380px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.logo { font-size: 48px; margin-bottom: 20px; }
h1 { font-size: 22px; font-weight: 700; color: #1a1d2e; margin-bottom: 8px; }
.subtitle { font-size: 14px; color: #718096; margin-bottom: 36px; line-height: 1.6; }
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 14px 24px;
  background: #fff;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  color: #2d3748;
  cursor: pointer;
  text-decoration: none;
  transition: all .2s;
}
.google-btn:hover { border-color: #5b6eff; background: #f8f9ff; box-shadow: 0 4px 12px rgba(91,110,255,.15); }
.google-icon { width: 20px; height: 20px; flex-shrink: 0; }
.error { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 20px; }
.domain-note { margin-top: 24px; font-size: 12px; color: #a0aec0; }
.domain-note strong { color: #5b6eff; }
.divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #a0aec0; font-size: 13px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
.magic-form { text-align: left; }
.magic-form label { font-size: 12px; font-weight: 600; color: #718096; display: block; margin-bottom: 6px; }
.magic-form input {
  width: 100%; padding: 12px 14px; border: 2px solid #e2e8f0; border-radius: 10px;
  font-size: 14px; outline: none; transition: border-color .2s;
}
.magic-form input:focus { border-color: #5b6eff; }
.magic-btn {
  margin-top: 10px; width: 100%; padding: 13px; background: #5b6eff; color: #fff;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .2s;
}
.magic-btn:hover { background: #4a5ce8; }
.magic-btn:disabled { background: #a0aec0; cursor: not-allowed; }
.magic-sent { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; border-radius: 10px; padding: 14px; font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">

  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('error') === 'magic') {
      document.write('<div class="error">ログインリンクが無効または期限切れです。再度メールを送信してください。</div>');
    } else if (params.get('error')) {
      document.write('<div class="error">アクロビジョンのメールアドレス（@acrovision.co.jp）でログインしてください</div>');
    }
  </script>
  <a class="google-btn" href="/auth/google">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google アカウントでログイン
  </a>

  <div class="divider">または</div>

  <div class="magic-form" id="magicForm">
    <label>@acrovision.jp メールアドレス</label>
    <input type="email" id="magicEmail" placeholder="yourname@acrovision.jp" autocomplete="email" />
    <div id="magicEmailError" style="display:none;color:#c53030;font-size:12px;margin-top:4px;">@acrovision.jp のアドレスを入力してください</div>
    <button class="magic-btn" id="magicBtn" onclick="sendMagicLink()">メールでログインリンクを送る</button>
  </div>
  <div id="magicSent" class="magic-sent" style="display:none;"></div>
</div>

<script>
async function sendMagicLink() {
  const emailEl = document.getElementById('magicEmail');
  const btn = document.getElementById('magicBtn');
  const email = emailEl.value.trim().toLowerCase();
  const errEl = document.getElementById('magicEmailError');
  if (!email.endsWith('@acrovision.jp')) {
    emailEl.style.borderColor = '#e53e3e';
    errEl.style.display = '';
    emailEl.focus();
    return;
  }
  emailEl.style.borderColor = '';
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '送信中…';
  try {
    const r = await fetch('/auth/magic-link/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('magicForm').style.display = 'none';
      const sent = document.getElementById('magicSent');
      sent.style.display = '';
      sent.innerHTML = `✅ <strong>${email}</strong> にログインリンクを送信しました。<br>メールを確認してリンクをクリックしてください（30分間有効）。`;
    } else {
      btn.disabled = false;
      btn.textContent = 'メールでログインリンクを送る';
      alert(d.error || 'エラーが発生しました');
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'メールでログインリンクを送る';
    alert('通信エラーが発生しました: ' + e.message);
  }
}
document.getElementById('magicEmail').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMagicLink();
});
</script>
</body>
</html>
