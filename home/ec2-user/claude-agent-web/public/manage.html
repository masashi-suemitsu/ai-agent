<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク管理 — AI エージェント</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #5b6eff; --primary-dark: #4a5ce8; --primary-light: #edf2ff;
  --border: #e2e8f0; --text: #2d3748; --text-light: #718096;
  --success: #48bb78; --danger: #e53e3e; --warn: #ed8936; --bg: #f4f6fb;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 52px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.back-link { font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 500; padding: 4px 10px; border: 1px solid var(--primary); border-radius: 7px; transition: all .15s; }
.back-link:hover { background: var(--primary-light); }
.header-logo { width: 28px; height: 28px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 800; }
header h1 { font-size: 15px; font-weight: 700; }
header h1 small { font-size: 11px; font-weight: 400; color: var(--text-light); display: block; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.user-badge { font-size: 12px; color: var(--text-light); }
.role-chip { font-size: 11px; padding: 2px 9px; border-radius: 10px; font-weight: 600; border: 1px solid; }

.page { max-width: 880px; margin: 0 auto; padding: 24px 20px; }

.tab-nav { display: flex; gap: 4px; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 24px; width: fit-content; }
.tab-btn { padding: 8px 22px; border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; background: none; color: var(--text-light); transition: all .15s; }
.tab-btn.active { background: var(--primary); color: #fff; }
.tab-btn:hover:not(.active) { background: var(--bg); color: var(--text); }
.tab-content { display: none; }
.tab-content.active { display: block; }

.filter-bar { display: flex; gap: 6px; margin-bottom: 16px; }
.filter-btn { background: #fff; border: 1px solid var(--border); border-radius: 7px; padding: 5px 14px; font-size: 12px; cursor: pointer; color: var(--text-light); transition: all .12s; }
.filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

.card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; transition: box-shadow .15s; }
.card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.card-title { font-size: 15px; font-weight: 700; flex: 1; }
.card-badges { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.badge { display: inline-flex; align-items: center; border-radius: 5px; padding: 2px 9px; font-size: 11px; font-weight: 600; }
.badge-green  { background: #d4f5e2; color: #276749; }
.badge-gray   { background: #edf2f7; color: #718096; }
.badge-blue   { background: var(--primary-light); color: var(--primary-dark); }
.badge-orange { background: #fef3cd; color: #92400e; }
.badge-red    { background: #fde8e8; color: #9b1c1c; }

.card-meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
.card-meta span { display: flex; align-items: center; gap: 4px; }

.linked-skill { background: #f7f8fc; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.linked-skill-label { font-weight: 600; color: var(--text-light); font-size: 11px; margin-right: 2px; }

.steps-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--primary); cursor: pointer; background: var(--primary-light); border: none; border-radius: 6px; padding: 5px 12px; transition: background .12s; }
.steps-btn:hover { background: #dde8ff; }
.steps-body { margin-top: 10px; background: #f7f8fc; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 12px; line-height: 1.85; color: var(--text); white-space: pre-wrap; word-break: break-word; max-height: 260px; overflow-y: auto; display: none; }
.steps-body.open { display: block; }

.card-actions { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.btn { border: none; border-radius: 7px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-orange { background: var(--warn); color: #fff; }
.btn-orange:hover { background: #c97e2b; }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text-light); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger { background: none; border: 1px solid #fed7d7; color: var(--danger); }
.btn-danger:hover { background: #fff5f5; }
.btn:disabled { opacity: .5; cursor: default; }

.toggle-wrap { display: flex; align-items: center; gap: 8px; }
.toggle { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #cbd5e0; border-radius: 22px; transition: .2s; }
.toggle-slider:before { position: absolute; content: ''; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
input:checked + .toggle-slider { background: var(--primary); }
input:checked + .toggle-slider:before { transform: translateX(18px); }
.toggle-label { font-size: 12px; color: var(--text-light); min-width: 40px; }

.interval-row { display: none; align-items: center; gap: 8px; margin-top: 8px; padding: 8px 10px; background: #f7f8fc; border-radius: 8px; }
.interval-row.open { display: flex; }
.interval-row select { border: 1.5px solid var(--primary); border-radius: 7px; padding: 5px 10px; font-size: 12px; outline: none; background: #fff; }
.interval-row .btn { padding: 5px 12px; }

.empty { text-align: center; padding: 56px 20px; color: var(--text-light); }
.empty-icon { font-size: 42px; margin-bottom: 14px; }
.empty h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty p { font-size: 13px; line-height: 1.7; }
.empty a { color: var(--primary); font-weight: 600; text-decoration: none; }

.rules-block { background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
.rules-block-title { padding: 13px 18px; font-size: 13px; font-weight: 700; background: #f7f8fc; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.rules-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.rules-table th { padding: 8px 16px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 600; color: var(--text-light); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
.rules-table td { padding: 9px 16px; border-bottom: 1px solid #f0f2f5; vertical-align: top; }
.rules-table tr:last-child td { border-bottom: none; }
.rules-table tr:hover td { background: #fafbff; }
.check { color: var(--success); font-size: 14px; font-weight: 700; }
.cross { color: #cbd5e0; font-size: 14px; }
.tool-name { font-weight: 600; font-family: 'SF Mono', monospace; font-size: 11px; color: var(--primary-dark); }
.tool-desc { color: var(--text-light); }

.role-card { background: var(--primary-light); border: 1px solid #c3d0ff; border-radius: 12px; padding: 18px 22px; margin-bottom: 20px; display: flex; align-items: center; gap: 18px; }
.role-icon { font-size: 36px; }
.role-info h2 { font-size: 17px; font-weight: 700; color: var(--primary-dark); }
.role-info p { font-size: 13px; color: #4a5568; margin-top: 5px; line-height: 1.65; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-box { background: #fff; border-radius: 16px; padding: 24px; width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-subtitle { font-size: 13px; color: var(--primary-dark); font-weight: 600; margin-bottom: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modal-field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.modal-field select { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 14px; outline: none; }
.modal-field select:focus { border-color: var(--primary); }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.modal-btn-cancel { flex: 1; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 9px; font-size: 13px; cursor: pointer; }
.modal-btn-save { flex: 2; background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
.modal-btn-save:disabled { opacity: .6; cursor: default; }

@media (max-width: 600px) {
  .page { padding: 16px 12px; }
  .tab-btn { padding: 7px 14px; font-size: 12px; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="/" class="back-link">← チャット</a>
    <div class="header-logo">A</div>
    <h1>タスク管理<small>定期タスク・スキル・権限の確認</small></h1>
  </div>
  <div class="header-right">
    <span class="user-badge" id="userBadge"></span>
    <span class="role-chip" id="roleBadge" style="display:none;"></span>
  </div>
</header>

<div class="page">
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('tasks')">⏰ タスク</button>
    <button class="tab-btn" onclick="switchTab('history')">📊 実行履歴</button>
    <button class="tab-btn" onclick="switchTab('skills')">⚙️ スキル</button>
    <button class="tab-btn" onclick="switchTab('rules')">🔒 権限・ルール</button>
  </div>

  <!-- ─ 定期タスク ─ -->
  <div class="tab-content active" id="tab-tasks">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterTasks('all', this)">すべて</button>
      <button class="filter-btn" onclick="filterTasks('enabled', this)">有効のみ</button>
      <button class="filter-btn" onclick="filterTasks('disabled', this)">停止中のみ</button>
    </div>
    <div id="taskList"><div class="empty"><div class="empty-icon">⏳</div><p>読み込み中...</p></div></div>
  </div>

  <!-- ─ 実行履歴 ─ -->
  <div class="tab-content" id="tab-history">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterHistory('all', this)">すべて</button>
      <button class="filter-btn" onclick="filterHistory('done', this)">成功</button>
      <button class="filter-btn" onclick="filterHistory('error', this)">エラー</button>
      <button class="filter-btn" onclick="filterHistory('running', this)">実行中</button>
    </div>
    <div id="historyList"><div class="empty"><div class="empty-icon">⏳</div><p>読み込み中...</p></div></div>
  </div>

  <!-- ─ スキル ─ -->
  <div class="tab-content" id="tab-skills">
    <div id="skillList"><div class="empty"><div class="empty-icon">⏳</div><p>読み込み中...</p></div></div>
  </div>

  <!-- ─ 権限・ルール ─ -->
  <div class="tab-content" id="tab-rules">
    <div id="rulesContent"><div class="empty"><div class="empty-icon">⏳</div><p>読み込み中...</p></div></div>
  </div>
</div>

<!-- ─ Schedule Modal ─ -->
<div class="modal-overlay" id="scheduleModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title">⏰ タスクを設定</div>
    <div class="modal-subtitle" id="modalSkillTitle"></div>
    <div class="modal-field">
      <label>タスク種別</label>
      <div style="display:flex;gap:12px;margin-top:4px;">
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-weight:normal;">
          <input type="radio" name="mgTaskType" value="recurring" checked onchange="mgOnTaskTypeChange()"> 定期実行
        </label>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-weight:normal;">
          <input type="radio" name="mgTaskType" value="once" onchange="mgOnTaskTypeChange()"> 単発実行
        </label>
      </div>
    </div>
    <div class="modal-field" id="mgRecurringField">
      <label>実行間隔</label>
      <select id="modalInterval">
        <option value="30">30分ごと</option>
        <option value="60" selected>1時間ごと</option>
        <option value="120">2時間ごと</option>
        <option value="240">4時間ごと</option>
        <option value="480">8時間ごと</option>
        <option value="1440">毎日（24時間ごと）</option>
      </select>
    </div>
    <div class="modal-field" id="mgOnceField" style="display:none;">
      <label>実行日時</label>
      <input type="datetime-local" id="mgRunAt" style="width:100%;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;">
    </div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn-save" id="modalSaveBtn" onclick="saveSchedule()">登録する</button>
    </div>
  </div>
</div>

<script>
let allTasks = [];
let allSkills = [];
let currentUser = null;
let modalSkillId = null;

// ─ 初期化 ─
(async () => {
  currentUser = await fetch('/api/me').then(r => r.json());
  if (!currentUser) { location.href = '/login'; return; }
  renderUserBadge(currentUser);
  await Promise.all([loadTasks(), loadSkills()]);
  renderRules(currentUser.role);
  loadCustomRules();
})();

function renderUserBadge(me) {
  document.getElementById('userBadge').textContent = me.name || me.email;
  const roleLabels = {
    admin:   ['管理者', '#e53e3e', '#fff5f5'],
    gyoumu:  ['業務管理部', '#2b6cb0', '#ebf8ff'],
    eigyo:   ['営業', '#276749', '#f0fff4'],
    recruit: ['採用', '#6b46c1', '#faf5ff'],
    user:    ['一般', '#718096', '#f7fafc']
  };
  const rl = roleLabels[me.role] || roleLabels.user;
  const rb = document.getElementById('roleBadge');
  rb.textContent = rl[0];
  rb.style.color = rl[1];
  rb.style.background = rl[2];
  rb.style.borderColor = rl[1] + '60';
  rb.style.display = 'inline-block';
}

// ─ タブ切替 ─
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'history') loadHistory();
  if (name === 'rules') loadCustomRules();
}

// ─ 定期タスク ─
async function loadTasks() {
  try {
    allTasks = await fetch('/api/scheduled-tasks').then(r => r.json());
    renderTasks(allTasks);
  } catch(e) {
    document.getElementById('taskList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(e.message)}</p></div>`;
  }
}

function filterTasks(mode, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = mode === 'enabled'  ? allTasks.filter(t => t.enabled) :
                   mode === 'disabled' ? allTasks.filter(t => !t.enabled) : allTasks;
  renderTasks(filtered);
}

function renderTasks(tasks) {
  const el = document.getElementById('taskList');
  if (!tasks.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">⏰</div>
      <h3>定期タスクがありません</h3>
      <p>チャット画面のスキル一覧から ⏰ ボタンで登録できます。<br><a href="/">チャット画面へ</a></p>
    </div>`;
    return;
  }
  el.innerHTML = tasks.map(t => {
    const isOnce = t.task_type === 'once';
    const nextRun  = fmtDt(t.next_run_at);
    const lastRun  = fmtDt(t.last_run_at);
    const statusBadge = t.last_status ? `<span class="badge ${statusColor(t.last_status)}">${statusLabel(t.last_status)}</span>` : '';
    const typeBadge = isOnce
      ? '<span class="badge" style="background:#e9d8fd;color:#6b46c1;">単発</span>'
      : '<span class="badge" style="background:#bee3f8;color:#2b6cb0;">定期</span>';
    const enabledBadge = t.enabled
      ? '<span class="badge badge-green">▶ 有効</span>'
      : `<span class="badge badge-gray">${isOnce && t.last_status === 'done' ? '✓ 実行済' : '⏸ 停止中'}</span>`;
    const scheduleMeta = isOnce
      ? `<span>実行日時: ${nextRun}</span><span>前回: ${lastRun}</span>`
      : `<span>🔄 ${esc(intervalLabel(t.interval_min))}</span><span>次回: ${nextRun}</span><span>前回: ${lastRun}</span>`;
    return `<div class="card" id="task-card-${t.id}">
      <div class="card-header">
        <div class="card-title">${typeBadge} ${esc(t.skill_title || t.skill_name)}</div>
        <div class="card-badges">${enabledBadge}${statusBadge}</div>
      </div>
      <div class="card-meta">${scheduleMeta}</div>
      <div class="linked-skill">
        <span class="linked-skill-label">スキル</span>
        <span>⚙️ ${esc(t.skill_name)}</span>
      </div>
      ${t.steps ? `<button class="steps-btn" onclick="toggleSteps('task-steps-${t.id}', this)">📋 指示内容を確認 <span>▼</span></button>
      <div class="steps-body" id="task-steps-${t.id}">${esc(t.steps)}</div>` : ''}
      ${t.last_result ? `<div style="margin-top:8px;padding:8px 10px;background:#f7f8fc;border-radius:7px;font-size:12px;color:var(--text-light);line-height:1.6;">${esc(t.last_result.slice(0,300))}${t.last_result.length > 300 ? '…' : ''}</div>` : ''}
      <div class="card-actions">
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" ${t.enabled ? 'checked' : ''} onchange="toggleTask(${t.id}, this.checked)">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label" id="task-toggle-label-${t.id}">${t.enabled ? '有効' : (isOnce && t.last_status === 'done' ? '実行済' : '停止中')}</span>
        </div>
        ${!isOnce ? `<button class="btn btn-outline" onclick="openIntervalEdit(${t.id}, ${t.interval_min})">間隔を変更</button>` : ''}
        <button class="btn btn-danger" onclick="deleteTask(${t.id})">削除</button>
      </div>
      <div class="interval-row" id="interval-row-${t.id}">
        <select id="interval-select-${t.id}">
          <option value="30">30分ごと</option>
          <option value="60">1時間ごと</option>
          <option value="120">2時間ごと</option>
          <option value="240">4時間ごと</option>
          <option value="480">8時間ごと</option>
          <option value="1440">毎日</option>
        </select>
        <button class="btn btn-primary" onclick="saveInterval(${t.id})">保存</button>
        <button class="btn btn-outline" onclick="closeIntervalEdit(${t.id})">キャンセル</button>
      </div>
    </div>`;
  }).join('');
  // interval select の初期値をセット
  tasks.forEach(t => {
    const sel = document.getElementById(`interval-select-${t.id}`);
    if (sel) sel.value = String(t.interval_min);
  });
}

function openIntervalEdit(id, current) {
  const row = document.getElementById(`interval-row-${id}`);
  row.classList.add('open');
  const sel = document.getElementById(`interval-select-${id}`);
  if (sel) sel.value = String(current);
}
function closeIntervalEdit(id) {
  document.getElementById(`interval-row-${id}`)?.classList.remove('open');
}

async function saveInterval(id) {
  const sel = document.getElementById(`interval-select-${id}`);
  const interval_min = parseInt(sel.value);
  await fetch(`/api/scheduled-tasks/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ interval_min })
  });
  closeIntervalEdit(id);
  await loadTasks();
}

async function toggleTask(id, enabled) {
  await fetch(`/api/scheduled-tasks/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enabled })
  });
  const lbl = document.getElementById(`task-toggle-label-${id}`);
  if (lbl) lbl.textContent = enabled ? '有効' : '停止中';
  allTasks = allTasks.map(t => t.id === id ? { ...t, enabled: enabled ? 1 : 0 } : t);
}

async function deleteTask(id) {
  if (!confirm('この定期タスクを削除しますか？')) return;
  await fetch(`/api/scheduled-tasks/${id}`, { method: 'DELETE' });
  await loadTasks();
}

// ─ スキル ─
async function loadSkills() {
  try {
    allSkills = await fetch('/api/skills').then(r => r.json());
    renderSkills(allSkills);
  } catch(e) {
    document.getElementById('skillList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(e.message)}</p></div>`;
  }
}

function renderSkills(skills) {
  const el = document.getElementById('skillList');
  if (!skills.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">⚙️</div>
      <h3>スキルがありません</h3>
      <p>チャット画面でAIと会話して手順が決まったら<br>スキルとして保存できます。<br><a href="/">チャット画面へ</a></p>
    </div>`;
    return;
  }
  el.innerHTML = skills.map(s => {
    const isOwn = s.owner_email === currentUser?.email;
    return `<div class="card">
      <div class="card-header">
        <div class="card-title">${esc(s.title)}</div>
        <div class="card-badges">
          ${s.shared ? '<span class="badge badge-blue">共有</span>' : ''}
          ${!isOwn ? '<span class="badge badge-gray">他のユーザー</span>' : ''}
        </div>
      </div>
      ${s.description ? `<div style="font-size:13px;color:var(--text-light);margin-bottom:10px;line-height:1.6;">${esc(s.description)}</div>` : ''}
      <div class="card-meta">
        <span>📊 実行 ${s.run_count || 0} 回</span>
        <span>🕐 作成: ${fmtDt(s.created_at)}</span>
        <span>⚙️ ID: ${s.id}</span>
      </div>
      ${s.steps ? `<button class="steps-btn" onclick="toggleSteps('skill-steps-${s.id}', this)">📋 実行手順（指示内容）を確認 <span>▼</span></button>
      <div class="steps-body" id="skill-steps-${s.id}">${esc(s.steps)}</div>` : ''}
      ${isOwn ? `<div class="card-actions">
        <button class="btn btn-orange" onclick="openModal(${s.id}, ${JSON.stringify(s.title)})">⏰ 定期実行を設定</button>
        <button class="btn btn-outline" onclick="runSkillNow(${s.id}, ${JSON.stringify(s.title)}, this)">▶ 今すぐ実行</button>
        <button class="btn btn-danger" onclick="deleteSkill(${s.id})">削除</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

async function runSkillNow(id, title, btn) {
  if (!confirm(`「${title}」を今すぐ実行しますか？`)) return;
  btn.disabled = true; btn.textContent = '実行中...';
  try {
    const resp = await fetch(`/api/skills/${id}/run`, { method: 'POST' });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        try {
          const d = JSON.parse(line.slice(5));
          if (d.done) { btn.textContent = '✓ 実行完了'; setTimeout(() => { btn.disabled = false; btn.textContent = '▶ 今すぐ実行'; }, 3000); }
        } catch {}
      }
    }
  } catch(e) {
    alert(e.message); btn.disabled = false; btn.textContent = '▶ 今すぐ実行';
  }
}

async function deleteSkill(id) {
  if (!confirm('このスキルを削除しますか？')) return;
  await fetch(`/api/skills/${id}`, { method: 'DELETE' });
  await loadSkills();
}

async function loadCustomRules() {
  try {
    const data = await fetch('/api/user-settings').then(r => r.json());
    const el = document.getElementById('customRulesInput');
    if (el) el.value = data.custom_rules || '';
  } catch(e) {}
}
async function saveCustomRules() {
  const el = document.getElementById('customRulesInput');
  const btn = document.getElementById('saveRulesBtn');
  const msg = document.getElementById('saveRulesMsg');
  if (!el || !btn) return;
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const resp = await fetch('/api/user-settings', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ custom_rules: el.value })
    });
    if (!resp.ok) throw new Error('保存失敗');
    if (msg) { msg.style.display = 'inline'; setTimeout(() => { msg.style.display = 'none'; }, 3000); }
  } catch(e) {
    alert(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '保存する';
  }
}

// ─ スケジュールモーダル ─
function mgOnTaskTypeChange() {
  const isOnce = document.querySelector('input[name="mgTaskType"]:checked').value === 'once';
  document.getElementById('mgRecurringField').style.display = isOnce ? 'none' : '';
  document.getElementById('mgOnceField').style.display = isOnce ? '' : 'none';
  if (isOnce && !document.getElementById('mgRunAt').value) {
    const d = new Date(Date.now() + 3600000);
    d.setSeconds(0, 0);
    document.getElementById('mgRunAt').value = d.toISOString().slice(0, 16);
  }
}
function openModal(skillId, skillTitle) {
  modalSkillId = skillId;
  document.getElementById('modalSkillTitle').textContent = skillTitle;
  document.getElementById('modalInterval').value = '60';
  document.querySelector('input[name="mgTaskType"][value="recurring"]').checked = true;
  document.getElementById('mgRecurringField').style.display = '';
  document.getElementById('mgOnceField').style.display = 'none';
  document.getElementById('scheduleModal').classList.add('open');
}
function closeModal() {
  document.getElementById('scheduleModal').classList.remove('open');
  modalSkillId = null;
}
async function saveSchedule() {
  if (!modalSkillId) return;
  const task_type = document.querySelector('input[name="mgTaskType"]:checked').value;
  const btn = document.getElementById('modalSaveBtn');
  btn.disabled = true; btn.textContent = '登録中...';
  try {
    const body = { skill_id: modalSkillId, task_type };
    if (task_type === 'once') {
      const runAt = document.getElementById('mgRunAt').value;
      if (!runAt) { alert('実行日時を指定してください'); btn.disabled = false; btn.textContent = '登録する'; return; }
      body.run_at = new Date(runAt).toISOString();
    } else {
      body.interval_min = parseInt(document.getElementById('modalInterval').value);
    }
    const resp = await fetch('/api/scheduled-tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '登録失敗');
    closeModal();
    await loadTasks();
    switchTabByName('tasks');
  } catch(e) {
    alert(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '登録する';
  }
}
function switchTabByName(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const idx = { tasks: 0, history: 1, skills: 2, rules: 3 };
  const btns = document.querySelectorAll('.tab-btn');
  if (btns[idx[name] ?? 0]) btns[idx[name] ?? 0].classList.add('active');
  if (name === 'history') loadHistory();
}

// ─ 実行履歴 ─
let allHistory = [];

async function loadHistory() {
  try {
    allHistory = await fetch('/api/task-runs').then(r => r.json());
    renderHistory(allHistory);
  } catch(e) {
    document.getElementById('historyList').innerHTML = `<div class="empty"><p>${esc(e.message)}</p></div>`;
  }
}

function filterHistory(type, btn) {
  document.querySelectorAll('#tab-history .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = type === 'all' ? allHistory : allHistory.filter(r => r.status === type);
  renderHistory(filtered);
}

function renderHistory(runs) {
  const el = document.getElementById('historyList');
  if (!runs.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>実行履歴がありません</h3><p>タスクが実行されると、ここに記録が表示されます。</p></div>`;
    return;
  }
  el.innerHTML = runs.map(r => {
    const statusColor = r.status === 'done' ? 'badge-green' : r.status === 'error' ? 'badge-red' : 'badge-orange';
    const statusText  = r.status === 'done' ? '✓ 成功' : r.status === 'error' ? '✗ エラー' : '⟳ 実行中';
    const started  = fmtDt(r.started_at);
    const finished = fmtDt(r.finished_at);
    const duration = r.started_at && r.finished_at
      ? Math.round((new Date(r.finished_at.replace(' ','T')+'Z') - new Date(r.started_at.replace(' ','T')+'Z')) / 1000) + '秒'
      : '─';
    return `<div class="card">
      <div class="card-header">
        <div class="card-title">${esc(r.skill_title || r.skill_name)}</div>
        <div class="card-badges"><span class="badge ${statusColor}">${statusText}</span></div>
      </div>
      <div class="card-meta">
        <span>🕐 開始: ${started}</span>
        <span>🏁 完了: ${finished}</span>
        <span>⏱ 所要: ${duration}</span>
        <span style="font-size:11px;color:#a0aec0;">スキル: ${esc(r.skill_name)}</span>
      </div>
      ${r.result ? `<div style="background:#f7f8fc;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;">${esc(r.result)}</div>` : ''}
    </div>`;
  }).join('');
}

// ─ 指示内容の展開 ─
function toggleSteps(id, btn) {
  const el = document.getElementById(id);
  const open = el.classList.toggle('open');
  btn.querySelector('span').textContent = open ? '▲' : '▼';
  btn.textContent = btn.textContent.replace(open ? '確認' : '閉じる', open ? '閉じる' : '確認');
  // ボタンのテキスト再構築
  btn.innerHTML = `📋 指示内容を${open ? '閉じる' : '確認'} <span>${open ? '▲' : '▼'}</span>`;
}

// ─ ユーティリティ ─
function esc(t) {
  return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDt(dt) {
  if (!dt) return '─';
  const s = String(dt).replace(' ', 'T');
  // UTC文字列として扱いJSTに変換（末尾にZがなければ付加）
  const d = new Date(s.endsWith('Z') || s.includes('+') ? s : s + 'Z');
  return d.toLocaleString('ja-JP', { timeZone:'Asia/Tokyo', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function intervalLabel(min) {
  if (min < 60)   return `${min}分ごと`;
  if (min === 60) return '1時間ごと';
  if (min < 1440) return `${min/60}時間ごと`;
  return '毎日';
}
function statusLabel(s) {
  return { done:'完了', running:'実行中', error:'エラー' }[s] || s;
}
function statusColor(s) {
  return { done:'badge-green', running:'badge-orange', error:'badge-red' }[s] || 'badge-gray';
}
